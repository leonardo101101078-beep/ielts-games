<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>打打打打字啊啊啊</title>
  <link rel="manifest" href="manifest-typing.json" />
  <link rel="icon" href="icon-typing.svg" type="image/svg+xml" />
  <meta name="theme-color" content="#C9A84C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="打打打打字啊啊啊" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #FAF8F3;
      --ink:         #1A1A2E;
      --ink-soft:    #4A4A6A;
      --ink-faint:   #9898B0;
      --gold:        #C9A84C;
      --gold-pale:   #F0E4BC;
      --green:       #27795A;
      --green-pale:  #EEF8F3;
      --red:         #B83232;
      --red-pale:    #FDF0EE;
      --card-bg:     #FFFFFF;
      --radius:      14px;
      --sky-h:       440px;
      --card-h:      90px;   /* approximate card height for fall endpoint */
    }

    html, body {
      height: 100%;
      min-height: 100dvh;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 16px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    button { touch-action: manipulation; cursor: pointer; border: none; }

    /* ── screens ── */
    .screen {
      width: 100%;
      max-width: 480px;
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .screen.active { display: flex; }

    /* ══════════════════════════════
       START SCREEN
    ══════════════════════════════ */
    #start-screen {
      gap: 32px;
      text-align: center;
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .brand-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      font-weight: 600;
    }
    .brand-title {
      font-size: 1.85rem;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
    }
    .brand-title span { color: var(--gold); }
    .brand-desc {
      font-size: 0.88rem;
      color: var(--ink-soft);
      line-height: 1.6;
    }

    .difficulty-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      width: 100%;
    }

    .diff-btn {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 20px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 0 0 1.5px #E8E4DA;
      transition: box-shadow .15s, transform .15s;
    }
    .diff-btn:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.10), 0 0 0 1.5px var(--gold);
      transform: translateY(-2px);
    }
    .diff-btn:active { transform: translateY(0); }

    .diff-btn .diff-icon { font-size: 1.5rem; }
    .diff-btn .diff-name {
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      text-transform: uppercase;
    }
    .diff-btn .diff-sec {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }
    .diff-btn .diff-unit {
      font-size: 0.7rem;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ══════════════════════════════
       GAME SCREEN
    ══════════════════════════════ */
    #game-screen {
      gap: 0;
      width: 100%;
    }

    /* top bar */
    #game-topbar {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px 12px;
    }
    #q-counter {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    #diff-badge {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      background: var(--gold-pale);
      color: var(--gold);
    }

    /* timer bar */
    #timer-bar-wrap {
      width: 100%;
      height: 4px;
      background: #E8E4DA;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 0;
    }
    #timer-bar {
      height: 100%;
      width: 100%;
      background: var(--gold);
      transform-origin: left center;
      border-radius: 2px;
    }
    #timer-bar.running {
      animation: shrink-bar linear forwards;
    }
    @keyframes shrink-bar {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* sky — overflow visible so card bottom is never clipped */
    #sky {
      width: 100%;
      height: var(--sky-h);
      position: relative;
      overflow: visible;
      background: linear-gradient(180deg, #F5F0E8 0%, var(--bg) 100%);
      border-left: 1.5px solid #E8E4DA;
      border-right: 1.5px solid #E8E4DA;
      /* clip only horizontally so card never goes left/right outside */
      clip-path: inset(0 0 -200px 0);
    }

    /* ground */
    #ground {
      width: 100%;
      height: 6px;
      background: var(--ink);
      border-radius: 0 0 3px 3px;
      position: relative;
      z-index: 2;
    }

    /* falling word */
    #word-card {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: var(--card-bg);
      border-radius: 12px;
      padding: 12px 28px 10px;
      box-shadow: 0 2px 16px rgba(0,0,0,.10), 0 0 0 1.5px #E8E4DA;
      white-space: nowrap;
      text-align: center;
      z-index: 1;
    }
    #word-card .word-text {
      font-size: 1.55rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--ink);
      line-height: 1.2;
    }
    /* Chinese meaning */
    #word-card .word-zh {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--gold);
      margin-top: 3px;
      letter-spacing: 0.04em;
    }
    #word-card .word-hint {
      font-size: 0.68rem;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
      margin-top: 3px;
    }
    #word-card.falling {
      animation: fall linear forwards;
    }
    /* card bottom aligns with sky bottom at animation end */
    @keyframes fall {
      from { top: -100px; }
      to   { top: calc(var(--sky-h) - var(--card-h)); }
    }
    #word-card.correct {
      background: var(--green-pale);
      box-shadow: 0 2px 16px rgba(39,121,90,.15), 0 0 0 1.5px var(--green);
    }
    #word-card.correct .word-text { color: var(--green); }
    #word-card.correct .word-zh   { color: var(--green); opacity: .75; }
    #word-card.timeout {
      background: var(--red-pale);
      box-shadow: 0 2px 16px rgba(184,50,50,.15), 0 0 0 1.5px var(--red);
    }
    #word-card.timeout .word-text { color: var(--red); }
    #word-card.timeout .word-zh   { color: var(--red); opacity: .75; }

    /* typed chars indicator */
    #typed-display {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      color: var(--ink-faint);
      pointer-events: none;
      font-family: 'Courier New', monospace;
      white-space: nowrap;
    }

    /* input area */
    #input-area {
      width: 100%;
      padding: 16px 4px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    #word-input {
      width: 100%;
      padding: 14px 20px;
      font-size: 1.1rem;
      font-family: inherit;
      border: 1.5px solid #E8E4DA;
      border-radius: var(--radius);
      background: var(--card-bg);
      color: var(--ink);
      outline: none;
      transition: border-color .2s;
      text-align: center;
      letter-spacing: 0.08em;
    }
    #word-input:focus { border-color: var(--gold); }
    #word-input.correct { border-color: var(--green); background: var(--green-pale); }
    #word-input.wrong   { border-color: var(--red);   background: var(--red-pale); }

    #input-hint {
      font-size: 0.75rem;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
    }

    /* ══════════════════════════════
       RESULT SCREEN
    ══════════════════════════════ */
    #result-screen {
      gap: 24px;
      text-align: center;
    }

    .result-header { display: flex; flex-direction: column; gap: 6px; }
    .result-grade {
      font-size: 0.75rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      font-weight: 600;
    }
    .result-score {
      font-size: 3.2rem;
      font-weight: 800;
      color: var(--ink);
      letter-spacing: -0.04em;
      line-height: 1;
    }
    .result-score span { color: var(--gold); }
    .result-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink-soft);
    }

    .missed-section {
      width: 100%;
      text-align: left;
    }
    .missed-title {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      font-weight: 700;
      margin-bottom: 10px;
    }
    .missed-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .missed-chip {
      font-size: 0.82rem;
      font-weight: 600;
      padding: 5px 12px;
      background: var(--red-pale);
      color: var(--red);
      border-radius: 20px;
      letter-spacing: 0.04em;
    }
    .no-missed {
      font-size: 0.88rem;
      color: var(--green);
      font-weight: 600;
    }

    .result-actions {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-primary {
      width: 100%;
      padding: 15px;
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: opacity .15s, transform .15s;
    }
    .btn-primary:hover { opacity: .85; }
    .btn-primary:active { transform: scale(.98); }
    .btn-secondary {
      width: 100%;
      padding: 13px;
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink-soft);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1.5px solid #E8E4DA;
      transition: border-color .15s, color .15s;
    }
    .btn-secondary:hover { border-color: var(--ink-soft); color: var(--ink); }

    /* ══════════════════════════════
       MORE MODES (start screen)
    ══════════════════════════════ */
    .mode-section { width: 100%; text-align: center; }
    .mode-section-title {
      font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--ink-faint); font-weight: 600; margin-bottom: 12px;
    }
    .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mode-grid-single { grid-template-columns: 1fr; max-width: 100%; }
    .mode-btn {
      background: var(--card-bg); border-radius: var(--radius); padding: 18px 12px;
      display: flex; flex-direction: column; align-items: center; gap: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,.07), 0 0 0 1.5px #E8E4DA;
      transition: box-shadow .15s, transform .15s;
    }
    .mode-btn:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,.10), 0 0 0 1.5px var(--gold);
      transform: translateY(-2px);
    }
    .mode-btn:active { transform: translateY(0); }
    .mode-btn .mode-icon { font-size: 1.5rem; }
    .mode-btn .mode-name { font-size: 0.88rem; font-weight: 700; color: var(--ink); }
    .mode-btn .mode-sub { font-size: 0.7rem; color: var(--ink-faint); letter-spacing: 0.06em; }


    /* ══════════════════════════════
       ESSAY SCREEN
    ══════════════════════════════ */
    #essay-screen { gap: 18px; width: 100%; }
    #essay-topbar {
      width: 100%; display: flex; justify-content: space-between;
      align-items: center; padding: 0 4px;
    }
    #essay-counter {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--ink-soft);
    }
    #essay-category-badge {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
      padding: 3px 10px; border-radius: 20px;
      background: var(--gold-pale); color: var(--gold);
    }
    #essay-card {
      width: 100%; background: var(--card-bg); border-radius: var(--radius);
      padding: 22px 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,.06), 0 0 0 1.5px #E8E4DA;
      display: flex; flex-direction: column; gap: 12px;
    }
    #essay-zh-label {
      font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--ink-faint); font-weight: 700; margin-bottom: 4px;
    }
    #essay-function {
      font-size: 1.12rem; font-weight: 600; color: var(--ink-soft);
      line-height: 1.45; margin-bottom: 14px;
    }
    #essay-en-hint {
      font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--ink-faint); font-weight: 600; margin-bottom: 6px;
    }
    #essay-target {
      font-size: 1.05rem; line-height: 1.75;
      font-family: 'Georgia', 'Times New Roman', serif;
      color: #C8C4BA; letter-spacing: 0.01em; word-break: break-word;
    }
    #essay-target .t-ok  { color: var(--ink); }
    #essay-target .t-err { color: var(--red); background: var(--red-pale); border-radius: 2px; }
    #essay-target .t-cur { border-left: 2px solid var(--gold); margin-left: 1px;
      animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { border-left-color: transparent; } }
    #essay-progress-wrap {
      width: 100%; height: 3px; background: #E8E4DA; border-radius: 2px; overflow: hidden;
    }
    #essay-progress-fill {
      height: 100%; background: var(--gold); border-radius: 2px;
      transition: width .12s; width: 0%;
    }
    #essay-input-area { width: 100%; display: flex; flex-direction: column; gap: 6px; }
    #essay-input {
      width: 100%; background: var(--card-bg); border: 2px solid #E8E4DA;
      border-radius: var(--radius); padding: 12px 16px; font-size: 0.95rem;
      font-family: inherit; color: var(--ink); outline: none; transition: border-color .2s;
    }
    #essay-input:focus   { border-color: var(--gold); }
    #essay-input.correct { border-color: var(--green); background: var(--green-pale); }
    #essay-char-count { font-size: 0.72rem; color: var(--ink-faint); text-align: right; }
    .essay-bottom {
      width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 12px;
    }
    #essay-skip-btn {
      background: none; color: var(--ink-faint); font-size: 0.8rem;
      padding: 6px 12px; border-radius: 8px; text-decoration: underline;
    }
    #essay-skip-btn:hover { color: var(--ink-soft); }
    #essay-status { font-size: 0.8rem; color: var(--ink-faint); }

    /* ── transitions ── */
    .screen { animation: fade-in .25s ease; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── shake animations ── */
    @keyframes shake {
      0%,100% { transform: translateX(-50%); }
      20%     { transform: translateX(calc(-50% - 8px)); }
      40%     { transform: translateX(calc(-50% + 8px)); }
      60%     { transform: translateX(calc(-50% - 6px)); }
      80%     { transform: translateX(calc(-50% + 4px)); }
    }
    @keyframes input-shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-8px); }
      40%     { transform: translateX(8px); }
      60%     { transform: translateX(-6px); }
      80%     { transform: translateX(4px); }
    }
    #word-card.shake { animation: shake .35s ease !important; }
  </style>
</head>
<body>

  <!-- ══ START SCREEN ══ -->
  <section id="start-screen" class="screen active">
    <div class="brand">
      <div class="brand-label">IELTS Practice</div>
      <div class="brand-title">Typing <span>Speed</span></div>
      <div class="brand-desc">
        單字從天空落下，在觸地前正確打完即得分。<br>每局 15 題，選擇你的挑戰難度：
      </div>
    </div>

    <div class="difficulty-grid">
      <button class="diff-btn" data-sec="10">
        <span class="diff-icon">🌤</span>
        <span class="diff-name">Easy</span>
        <span class="diff-sec">10</span>
        <span class="diff-unit">秒 / 題</span>
      </button>
      <button class="diff-btn" data-sec="7">
        <span class="diff-icon">⛅</span>
        <span class="diff-name">Medium</span>
        <span class="diff-sec">7</span>
        <span class="diff-unit">秒 / 題</span>
      </button>
      <button class="diff-btn" data-sec="5">
        <span class="diff-icon">⛈</span>
        <span class="diff-name">Hard</span>
        <span class="diff-sec">5</span>
        <span class="diff-unit">秒 / 題</span>
      </button>
    </div>

    <div class="mode-section">
      <div class="mode-section-title">更多練習模式</div>
      <div class="mode-grid mode-grid-single">
        <button class="mode-btn" id="essay-mode-btn">
          <span class="mode-icon">✍️</span>
          <span class="mode-name">作文句型</span>
          <span class="mode-sub">隨機 10 題 · 無計時</span>
        </button>
      </div>
    </div>
  </section>

  <!-- ══ GAME SCREEN ══ -->
  <section id="game-screen" class="screen">
    <div id="game-topbar">
      <span id="q-counter">1 / 15</span>
      <span id="diff-badge">Easy · 10s</span>
    </div>

    <div id="timer-bar-wrap">
      <div id="timer-bar"></div>
    </div>

    <div id="sky">
      <div id="word-card">
        <div class="word-text" id="word-display">—</div>
        <div class="word-zh"   id="word-zh"></div>
        <div class="word-hint" id="word-hint"></div>
      </div>
      <div id="typed-display"></div>
    </div>

    <div id="ground"></div>

    <div id="input-area">
      <input
        id="word-input"
        type="text"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        placeholder="在此輸入單字…"
      />
      <div id="input-hint">完整輸入後自動判定，不需按 Enter</div>
    </div>
  </section>

  <!-- ══ RESULT SCREEN ══ -->
  <section id="result-screen" class="screen">
    <div class="result-header">
      <div class="result-grade" id="result-grade">得分</div>
      <div class="result-score"><span id="result-num">0</span><span id="result-total"> / 15</span></div>
      <div class="result-label" id="result-label">繼續加油！</div>
    </div>

    <div class="missed-section">
      <div class="missed-title" id="missed-title">未過關單字</div>
      <div class="missed-list" id="missed-list"></div>
    </div>

    <div class="result-actions">
      <button class="btn-primary"   id="retry-btn">再玩一次（同難度）</button>
      <button class="btn-secondary" id="change-diff-btn">更換難度</button>
      <button class="btn-primary"   id="retry-review-btn" style="display:none">再練一次</button>
      <button class="btn-secondary" id="back-home-btn"    style="display:none">回首頁</button>
    </div>
  </section>


  <!-- ══ ESSAY SCREEN (作文句型) ══ -->
  <section id="essay-screen" class="screen">
    <div id="essay-topbar">
      <span id="essay-counter">1 / 10</span>
      <span id="essay-category-badge">C1 引言句</span>
    </div>

    <div id="essay-card">
      <div id="essay-zh-label">中文含義</div>
      <div id="essay-function">引出爭議話題</div>
      <div id="essay-en-hint">請輸入以下英文句型（與上方預覽一致）</div>
      <div id="essay-target"></div>
    </div>

    <div id="essay-progress-wrap">
      <div id="essay-progress-fill"></div>
    </div>

    <div id="essay-input-area">
      <input
        id="essay-input"
        type="text"
        autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
        placeholder="照著上方句型逐字輸入…"
      />
      <div id="essay-char-count">0 / 0</div>
    </div>

    <div class="essay-bottom">
      <button id="essay-skip-btn">跳過此題</button>
      <span id="essay-status"></span>
    </div>
  </section>

<script>
  /* ══════════════════════════════════════════════
     WORD BANK — 2955 IELTS words from my-ielts vocabulary
     { word, zh (Chinese), hint (English example), audio (local mp3 path) }

  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }

  function playTone(freq, type, duration, gainPeak, startDelay = 0) {
    if (!audioCtx) return;
    const t   = audioCtx.currentTime + startDelay;
    const osc = audioCtx.createOscillator();
    const env = audioCtx.createGain();
    osc.connect(env);
    env.connect(audioCtx.destination);
    osc.type      = type;
    osc.frequency.setValueAtTime(freq, t);
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(gainPeak, t + 0.01);
    env.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.start(t);
    osc.stop(t + duration + 0.02);
  }

  /* short key-press click */
  function playTick() {
    ensureAudio();
    playTone(900, 'sine', 0.04, 0.08);
  }

  /* bright ascending two-note ding */
  function playCorrect() {
    ensureAudio();
    playTone(523, 'sine', 0.18, 0.25, 0);       // C5
    playTone(659, 'sine', 0.22, 0.25, 0.13);    // E5
  }

  /* low thud */
  function playWrong() {
    ensureAudio();
    playTone(160, 'triangle', 0.25, 0.35, 0);
    playTone(120, 'triangle', 0.18, 0.20, 0.06);
  }

  /* victory fanfare — C5 E5 G5 */
  function playVictory() {
    ensureAudio();
    playTone(523, 'sine', 0.22, 0.28, 0);

    playTone(784, 'sine', 0.35, 0.32, 0.30);

  /* ══════════════════════════════════════════════
     SPEECH — local mp3 → Google Dictionary → Web Speech fallback
  ══════════════════════════════════════════════ */
  let currentAudio = null;

  /* ── Voice selection (Web Speech fallback) ── */
  let bestVoice = null;
  function pickBestVoice() {
    const preferred = ['Samantha', 'Daniel', 'Karen', 'Moira', 'Tessa', 'Fiona'];
    const voices = speechSynthesis.getVoices();
    for (const name of preferred) {
      const v = voices.find(v => v.name.includes(name));
      if (v) { bestVoice = v; return; }
    }
    bestVoice = voices.find(v => v.lang === 'en-US')
             || voices.find(v => v.lang.startsWith('en'))
             || null;
  }
  if (window.speechSynthesis) {
    speechSynthesis.addEventListener('voiceschanged', pickBestVoice);
    pickBestVoice();
  }

  async function speakOnline(word) {
    try {
      const res  = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(word)}`);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const url  = data[0]?.phonetics?.find(p => p.audio)?.audio;
      if (!url) throw new Error();
      currentAudio = new Audio(url.startsWith('//') ? 'https:' + url : url);
      await currentAudio.play();
      return;
    } catch (_) {}
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(word);
    utt.lang  = 'en-US'; utt.rate = 0.85; utt.pitch = 1.0;
    if (bestVoice) utt.voice = bestVoice;
    speechSynthesis.speak(utt);
  }

  function speak(word) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
    speechSynthesis.cancel();

    const entry = WORDS.find(w => w.word === word);
    if (entry && entry.audio) {
      currentAudio = new Audio(entry.audio);
      currentAudio.play().catch(() => speakOnline(word));
      return;
    }
    speakOnline(word);
  }

  function speakEssay(text) {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang  = 'en-US'; utt.rate = 0.88; utt.pitch = 1.0;
    if (bestVoice) utt.voice = bestVoice;
    speechSynthesis.speak(utt);
  }

  const $ = id => document.getElementById(id);

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  /* ── Timer bar ── */
  function startTimerBar(sec) {
    const bar = $('timer-bar');
    bar.classList.remove('running');
    bar.style.animationName = 'none';
    bar.style.background = 'var(--gold)';
    bar.getBoundingClientRect();
    bar.style.animationName = '';
    bar.style.animationDuration = sec + 's';
    bar.classList.add('running');

    const half = sec / 2;
    setTimeout(() => { if (bar.classList.contains('running')) bar.style.background = '#C07020'; }, half * 1000);
    setTimeout(() => { if (bar.classList.contains('running')) bar.style.background = 'var(--red)'; }, (sec * 0.75) * 1000);
  }

  function stopTimerBar() {
    const bar = $('timer-bar');
    bar.classList.remove('running');
    bar.style.animationName = 'none';
  }

  /* ── Word card fall ── */
  function launchWord(sec) {
    const card = $('word-card');
    card.classList.remove('falling', 'correct', 'timeout', 'shake');
    card.style.animationName = 'none';
    card.style.top = '-100px';
    card.getBoundingClientRect();
    card.style.animationName = '';
    card.style.animationDuration = sec + 's';
    card.classList.add('falling');
  }

  /* ── Load next word ── */
  function nextWord() {
    if (qIndex >= SPEED_TOTAL) { endGame(); return; }

    locked  = false;
    current = queue[qIndex];

    $('q-counter').textContent    = `${qIndex + 1} / ${SPEED_TOTAL}`;
    $('word-display').textContent = current.word;
    $('word-zh').textContent      = current.zh;
    $('word-hint').textContent    = current.hint;
    $('word-input').value         = '';
    $('word-input').className     = '';
    $('typed-display').textContent = '';
    $('word-input').focus();

    launchWord(difficulty);
    startTimerBar(difficulty);
    speak(current.word);

    clearTimeout(fallTimer);
    fallTimer = setTimeout(() => {
      if (!locked) onTimeout();
    }, difficulty * 1000);
  }

  /* ── Correct answer ── */
  function onCorrect() {
    locked = true;
    clearTimeout(fallTimer);
    stopTimerBar();
    playCorrect();

    const card  = $('word-card');
    const input = $('word-input');
    const pos   = parseFloat(getComputedStyle(card).top);

    card.style.animationName = 'none';
    card.style.top           = pos + 'px';
    card.classList.add('correct');
    input.classList.add('correct');

    score++;
    qIndex++;

    setTimeout(() => nextWord(), 700);
  }

  /* ── Timeout ── */
  function onTimeout() {
    locked = true;
    stopTimerBar();
    playWrong();
    missed.push(current.word);

    const card  = $('word-card');
    const input = $('word-input');
    card.classList.add('timeout');
    input.classList.add('wrong');

    qIndex++;
    setTimeout(() => nextWord(), 900);
  }

    if (locked || !current) return;

    const typed = e.target.value.trim().toLowerCase();

    playTick();

    if (typed === current.word.toLowerCase()) {

  /* ── End game ── */
  function endGame() {
    showScreen('result-screen');

    $('result-num').textContent = score;

    let grade, label;
    if (score === SPEED_TOTAL) {
      grade = '完美通關 ✦';
      label = 'Perfect — 無懈可擊！';
      setTimeout(() => playVictory(), 200);
    } else if (score >= 13) {
      grade = '優秀成績';
      label = 'Excellent — 繼續保持！';
      setTimeout(() => playCorrect(), 200);
    } else if (score >= 10) {
      grade = '良好表現';
      label = 'Good — 再接再厲！';
    } else if (score >= 7) {
      grade = '尚可';
      label = '多練習幾次就能進步！';

    difficulty = sec;

    missed     = [];

      word:  r.answer,
      zh:    r.prompt,

  const ESSAY_PER_ROUND = 10;
  let essayQueue  = [];

  let essayIndex  = 0;
  let essayScore  = 0;
  let essaySkips  = 0;
  let essayLocked = false;

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function startEssay() {
    ensureAudio();
    currentMode = 'essay';
    essayIndex  = 0;
    essayScore  = 0;
    essaySkips  = 0;
    essayQueue  = shuffle(ESSAY_PHRASES).slice(0, ESSAY_PER_ROUND);
    showScreen('essay-screen');
    nextEssayPhrase();
  }

  function nextEssayPhrase() {
    if (essayIndex >= essayQueue.length) { endEssay(); return; }
    essayLocked = false;
    const ph = essayQueue[essayIndex];
    $('essay-counter').textContent        = `${essayIndex + 1} / ${essayQueue.length}`;
    $('essay-category-badge').textContent = ph.cat;
    $('essay-function').textContent       = ph.fn;
    $('essay-status').textContent         = '';
    const inp = $('essay-input');
    inp.value     = '';
    inp.className = '';
    $('essay-char-count').textContent = `0 / ${ph.target.length}`;
    $('essay-progress-fill').style.width = '0%';
    renderEssayTarget('');
    inp.focus();
    requestAnimationFrame(() => speakEssay(ph.target));
  }

  function renderEssayTarget(typed) {
    const target = essayQueue[essayIndex].target;
    let html = '';
    for (let i = 0; i < target.length; i++) {
      const ch = escHtml(target[i]);
      if (i < typed.length) {
        html += typed[i] === target[i]
          ? `<span class="t-ok">${ch}</span>`
          : `<span class="t-err">${ch}</span>`;
      } else if (i === typed.length) {
        html += `<span class="t-cur"></span>${ch}`;
      } else {
        html += ch;
      }
    }
    $('essay-target').innerHTML = html;
    const pct = Math.min(100, (typed.length / target.length) * 100);
    $('essay-progress-fill').style.width = pct + '%';
    $('essay-char-count').textContent = `${typed.length} / ${target.length}`;
  }

  $('essay-input').addEventListener('input', e => {
    if (essayLocked) return;
    const ph    = essayQueue[essayIndex];
    if (!ph) return;
    const typed = e.target.value;
    renderEssayTarget(typed);
    playTick();

    if (typed === ph.target) {
      essayLocked = true;
      essayScore++;
      playCorrect();
      $('essay-input').className = 'correct';
      $('essay-status').textContent = '✓ 正確！';
      $('essay-status').style.color = 'var(--green)';
      essayIndex++;
      setTimeout(() => nextEssayPhrase(), 800);
    }
  });

    essaySkips++;

    const list = $('missed-list');

    $('retry-review-btn').textContent   = '再練一次';
    $('back-home-btn').style.display    = '';
    if (essayScore === ESSAY_PER_ROUND) setTimeout(() => playVictory(), 200);
  }

  /* ── Mode buttons ── */
  $('essay-mode-btn').addEventListener('click',  () => startEssay());

  /* ── currentMode tracking for result screen ── */
  let currentMode = 'speed';
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw-typing.js').catch(() => {});
  }
</script>
</body>
