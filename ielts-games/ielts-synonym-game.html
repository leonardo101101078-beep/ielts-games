<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>同義詞消消消</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Favicon -->
  <link rel="icon" href="icon.svg" type="image/svg+xml" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="同義詞消消消" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #FAF8F3;
      --ink:        #1A1A2E;
      --ink-soft:   #4A4A6A;
      --ink-faint:  #9898B0;
      --gold:       #C9A84C;
      --gold-pale:  #F0E4BC;
      --green:      #27795A;
      --green-pale: #EEF8F3;
      --red:        #B83232;
      --red-pale:   #FDF0EE;
      --orange:     #C07020;
      --orange-pale:#FFF3E0;
      --card-bg:    #FFFFFF;
      --radius:     14px;
      --max-w:      520px;
    }

    html { height: 100%; }

    body {
      min-height: 100%;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, 'system-ui', BlinkMacSystemFont, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }

    button { touch-action: manipulation; }

    /* ════════════════════════════
       STICKY HEADER
    ════════════════════════════ */
    #game-header {
      position: sticky;
      top: 0;
      z-index: 10;
      width: 100%;
      background: var(--bg);
      padding-top: env(safe-area-inset-top);
    }

    #progress-wrap {
      width: 100%;
      height: 3px;
      background: #E8E4DA;
    }
    #progress-bar {
      height: 100%;
      background: var(--gold);
      transition: width 0.4s ease;
      width: 0%;
    }

    #header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px 6px;
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    #q-counter { font-weight: 600; }
    #score-display { color: var(--ink-soft); font-weight: 600; }
    #score-display strong {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
      margin-left: 2px;
    }

    /* ── Timer ring ── */
    #timer-ring {
      position: relative;
      width: 36px;
      height: 36px;
      flex-shrink: 0;
    }
    #timer-ring svg {
      width: 36px;
      height: 36px;
      transform: rotate(-90deg);
    }
    .timer-bg {
      fill: none;
      stroke: #E8E4DA;
      stroke-width: 3;
    }
    #timer-arc {
      fill: none;
      stroke: var(--gold);
      stroke-width: 3;
      stroke-dasharray: 99.9;
      stroke-dashoffset: 0;
      stroke-linecap: round;
      transition: stroke 0.3s;
    }
    #timer-arc.warn  { stroke: var(--orange); }
    #timer-arc.alert { stroke: var(--red); }
    #timer-num {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--ink-soft);
      letter-spacing: 0;
    }

    /* ════════════════════════════
       SCREENS
    ════════════════════════════ */
    .screen {
      display: none;
      width: 100%;
      max-width: var(--max-w);
      padding: 0 20px;
      flex: 1;
    }
    .screen.active { display: flex; flex-direction: column; }

    /* ════════════════════════════
       SCREEN 1 — DIFFICULTY
    ════════════════════════════ */
    #screen-difficulty {
      justify-content: center;
      padding-top: 40px;
      padding-bottom: 40px;
    }

    .diff-title {
      font-family: Georgia, serif;
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: normal;
      text-align: center;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .diff-subtitle {
      text-align: center;
      font-size: 0.8rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 36px;
    }

    .diff-cards {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .diff-card {
      width: 100%;
      padding: 20px 22px;
      background: var(--card-bg);
      border: 1.5px solid #E0DAD0;
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.18s, box-shadow 0.18s, transform 0.12s;
      position: relative;
      overflow: hidden;
    }
    .diff-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }
    .diff-card[data-level="beginner"]::before     { background: #6DB87A; }
    .diff-card[data-level="intermediate"]::before { background: var(--gold); }
    .diff-card[data-level="advanced"]::before     { background: #C05050; }

    .diff-card:hover, .diff-card:focus-visible {
      border-color: var(--gold);
      box-shadow: 0 4px 20px rgba(201,168,76,0.18);
      transform: translateY(-2px);
    }
    @media (hover: none) {
      .diff-card:hover { transform: none; box-shadow: none; }
      .diff-card:active { opacity: 0.8; }
    }

    .diff-card-top {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }
    .diff-name-zh {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
    }
    .diff-name-en {
      font-size: 0.82rem;
      color: var(--ink-soft);
      letter-spacing: 0.06em;
    }
    .diff-desc {
      font-size: 0.8rem;
      color: var(--ink-faint);
    }
    .diff-arrow {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
      color: var(--ink-faint);
    }

    /* Wrong-card (localStorage review) */
    #wrong-card-wrap { margin-top: 14px; }
    #wrong-card {
      width: 100%;
      padding: 18px 22px;
      background: var(--card-bg);
      border: 1.5px solid #E0DAD0;
      border-left: 4px solid var(--red);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: left;
      transition: border-color 0.18s, box-shadow 0.18s;
      position: relative;
    }
    #wrong-card:hover {
      border-color: var(--red);
      box-shadow: 0 4px 20px rgba(184,50,50,0.12);
    }
    @media (hover: none) { #wrong-card:active { opacity: 0.8; } }
    #wrong-card-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 4px;
    }
    #wrong-card-meta {
      font-size: 0.8rem;
      color: var(--ink-faint);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #clear-history-btn {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--ink-faint);
      background: transparent;
      border: 1px solid #D8D2C4;
      border-radius: 6px;
      padding: 3px 8px;
      cursor: pointer;
    }
    #clear-history-btn:hover { color: var(--red); border-color: var(--red); }

    /* ════════════════════════════
       SCREEN 2 — GAME
    ════════════════════════════ */
    #screen-game {
      padding-top: 20px;
      gap: 0;
    }

    /* Sentence */
    #sentence-block {
      background: var(--card-bg);
      border: 1px solid #E8E4DA;
      border-radius: var(--radius);
      padding: 16px 18px;
      font-size: clamp(0.88rem, 2.2vw, 1rem);
      line-height: 1.7;
      color: var(--ink-soft);
      margin-bottom: 16px;
    }
    #sentence-block .target-word {
      color: var(--gold);
      text-decoration: underline;
      text-underline-offset: 3px;
      font-weight: 600;
    }

    /* Base word card */
    #base-word-card {
      background: var(--ink);
      color: var(--bg);
      border-radius: var(--radius);
      padding: 18px 20px;
      text-align: center;
      margin-bottom: 20px;
    }
    #base-word {
      font-family: Georgia, serif;
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: normal;
      letter-spacing: -0.01em;
      line-height: 1.1;
    }
    #base-word-label {
      font-size: 0.68rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.45);
      margin-top: 4px;
    }

    /* Instruction */
    #game-instruction {
      font-size: 0.78rem;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
      text-align: center;
      margin-bottom: 16px;
    }

    /* Options grid */
    #options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    @media (min-width: 480px) {
      #options-grid { grid-template-columns: repeat(3, 1fr); }
    }

    .opt-btn {
      min-height: 52px;
      padding: 12px 10px;
      background: var(--card-bg);
      border: 1.5px solid #D8D2C4;
      border-radius: var(--radius);
      color: var(--ink);
      font-family: Georgia, serif;
      font-size: clamp(0.9rem, 2.4vw, 1.05rem);
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s, transform 0.1s;
      line-height: 1.3;
      word-break: break-word;
    }
    .opt-btn:hover:not(:disabled) {
      border-color: var(--gold);
      box-shadow: 0 2px 12px rgba(201,168,76,0.15);
    }
    @media (hover: none) {
      .opt-btn:hover { border-color: #D8D2C4; box-shadow: none; }
      .opt-btn:active:not(:disabled) { opacity: 0.75; }
    }
    .opt-btn.selected {
      border-color: var(--gold);
      background: var(--gold-pale);
      color: #7A5A10;
    }
    .opt-btn.reveal-correct {
      border-color: var(--green);
      background: var(--green-pale);
      color: var(--green);
    }
    .opt-btn.reveal-wrong {
      border-color: var(--red);
      background: var(--red-pale);
      color: var(--red);
    }
    .opt-btn.reveal-missed {
      border-color: var(--orange);
      background: var(--orange-pale);
      color: var(--orange);
    }
    .opt-btn:disabled { cursor: default; }

    /* Confirm button */
    #confirm-btn {
      width: 100%;
      padding: 15px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 0.88rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.1s;
      margin-bottom: 12px;
    }
    #confirm-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }
    #confirm-btn:not(:disabled):hover { opacity: 0.85; }
    #confirm-btn:not(:disabled):active { transform: scale(0.98); }

    /* Next button */
    #next-btn {
      width: 100%;
      padding: 15px;
      background: transparent;
      color: var(--gold);
      border: 1.5px solid var(--gold);
      border-radius: var(--radius);
      font-size: 0.88rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      display: none;
      transition: background 0.18s, color 0.18s;
    }
    #next-btn.visible { display: block; }
    #next-btn:hover { background: var(--gold); color: #fff; }
    @media (hover: none) {
      #next-btn:active { background: var(--gold); color: #fff; }
    }

    /* Feedback line */
    #feedback {
      font-size: 0.85rem;
      color: var(--ink-soft);
      text-align: center;
      min-height: 1.3rem;
      margin-bottom: 14px;
      transition: opacity 0.2s;
      opacity: 0;
    }
    #feedback.visible { opacity: 1; }

    /* ════════════════════════════
       SCREEN 3 — END / REVIEW
    ════════════════════════════ */
    #screen-end {
      padding-top: 28px;
      padding-bottom: 40px;
      gap: 0;
    }

    /* Score summary */
    #score-summary {
      text-align: center;
      padding: 28px 20px;
      margin-bottom: 24px;
    }
    #score-label {
      font-size: 0.75rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 6px;
    }
    #score-band {
      font-family: Georgia, serif;
      font-size: clamp(3.5rem, 14vw, 5.5rem);
      color: var(--gold);
      line-height: 1;
      margin-bottom: 6px;
    }
    #score-band-label {
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 12px;
    }
    #score-tier {
      font-size: 1.1rem;
      font-family: Georgia, serif;
      color: var(--ink);
      margin-bottom: 6px;
    }
    #score-desc {
      font-size: 0.85rem;
      color: var(--ink-soft);
      line-height: 1.6;
      max-width: 300px;
      margin: 0 auto;
    }

    /* Review section title */
    .review-section-title {
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 12px;
      padding-left: 4px;
    }

    /* Review cards */
    #review-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }

    .review-card {
      background: var(--card-bg);
      border-radius: var(--radius);
      border: 1px solid #E8E4DA;
      border-left-width: 4px;
      padding: 16px 16px 16px 18px;
      overflow: hidden;
    }
    .review-card.correct { border-left-color: var(--green); }
    .review-card.wrong   { border-left-color: var(--red); }

    .review-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .review-q-label {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-soft);
    }
    .review-result-badge {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 2px 8px;
      border-radius: 99px;
    }
    .review-card.correct .review-result-badge {
      background: var(--green-pale);
      color: var(--green);
    }
    .review-card.wrong .review-result-badge {
      background: var(--red-pale);
      color: var(--red);
    }

    .review-sentence {
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--ink-soft);
      margin-bottom: 12px;
    }
    .review-sentence .target-word {
      color: var(--gold);
      font-weight: 600;
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    .review-answers {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 10px;
      font-size: 0.82rem;
    }
    .review-answer-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .review-answer-label {
      color: var(--ink-faint);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .review-answer-words { color: var(--ink); }
    .review-answer-words.miss { color: var(--red); }

    .review-explanation {
      font-size: 0.8rem;
      color: var(--ink-soft);
      line-height: 1.6;
      padding-top: 10px;
      border-top: 1px solid #EEEAE0;
    }
    .review-explanation::before {
      content: '解析 ';
      font-weight: 600;
      color: var(--ink-faint);
      letter-spacing: 0.04em;
    }

    /* Restart */
    #restart-btn {
      width: 100%;
      padding: 15px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-size: 0.88rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.18s;
    }
    #restart-btn:hover { opacity: 0.82; }

    /* ════════════════════════════
       ANIMATIONS
    ════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.32s ease both; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-5px); }
      80%     { transform: translateX(5px); }
    }
    .shake { animation: shake 0.36s ease; }

    /* ════════════════════════════
       FOOTER
    ════════════════════════════ */
    .page-footer {
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #C8C4BC;
      text-align: center;
      padding: 20px 0 4px;
    }
  </style>
</head>
<body>

  <!-- Sticky header (hidden on difficulty screen) -->
  <header id="game-header" style="display:none">
    <div id="progress-wrap"><div id="progress-bar"></div></div>
    <div id="header-row">
      <span id="q-counter">第 1 題 / 共 10 題</span>
      <div id="timer-ring">
        <svg viewBox="0 0 36 36">
          <circle class="timer-bg" cx="18" cy="18" r="15.9"/>
          <circle id="timer-arc"  cx="18" cy="18" r="15.9"/>
        </svg>
        <span id="timer-num">10</span>
      </div>
      <span id="score-display"><strong id="score-val">0</strong> / 10</span>
    </div>
  </header>

  <!-- ── Screen 1: Difficulty ── -->
  <section id="screen-difficulty" class="screen active">
    <h1 class="diff-title">Synonym Elimination</h1>
    <p class="diff-subtitle">IELTS Vocabulary Training</p>
    <div class="diff-cards">
      <button class="diff-card" data-level="beginner" aria-label="初階">
        <div class="diff-card-top">
          <span class="diff-name-zh">初階</span>
          <span class="diff-name-en">Beginner · Band 4–5</span>
        </div>
        <p class="diff-desc">基礎動詞與形容詞替換</p>
        <span class="diff-arrow">›</span>
      </button>
      <button class="diff-card" data-level="intermediate" aria-label="中階">
        <div class="diff-card-top">
          <span class="diff-name-zh">中階</span>
          <span class="diff-name-en">Intermediate · Band 6–7</span>
        </div>
        <p class="diff-desc">學術詞彙辨析與語境替換</p>
        <span class="diff-arrow">›</span>
      </button>
      <button class="diff-card" data-level="advanced" aria-label="高階">
        <div class="diff-card-top">
          <span class="diff-name-zh">高階</span>
          <span class="diff-name-en">Advanced · Band 8–9</span>
        </div>
        <p class="diff-desc">精確語境替換與搭配詞辨析</p>
        <span class="diff-arrow">›</span>
      </button>
    </div>
    <div id="wrong-card-wrap" style="display:none">
      <div id="wrong-card">
        <div id="wrong-card-title">錯題回顧</div>
        <div id="wrong-card-meta">
          <span id="wrong-card-count"></span>
          <button id="clear-history-btn" onclick="event.stopPropagation(); clearHistory()">清除記錄</button>
        </div>
      </div>
    </div>
    <p class="page-footer">每次從選定難度隨機抽取 10 題</p>
  </section>

  <!-- ── Screen 2: Game ── -->
  <section id="screen-game" class="screen">
    <div id="sentence-block" class="fade-up"></div>
    <div id="base-word-card" class="fade-up">
      <div id="base-word"></div>
      <div id="base-word-label">Target Word</div>
    </div>
    <p id="game-instruction">選出所有可在此句中替換目標單字的詞</p>
    <div id="options-grid"></div>
    <p id="feedback"></p>
    <button id="confirm-btn" disabled>確認送出</button>
    <button id="next-btn">下一題 →</button>
  </section>

  <!-- ── Screen 3: End / Review ── -->
  <section id="screen-end" class="screen">
    <div id="score-summary">
      <p id="score-label">本次成績</p>
      <div id="score-band"></div>
      <p id="score-band-label">/ 10 分</p>
      <p id="score-tier"></p>
      <p id="score-desc"></p>
    </div>
    <p class="review-section-title">題目解析</p>
    <div id="review-list"></div>
    <button id="restart-btn">選擇難度 / 再玩一次</button>
  </section>

  <script>
  /* ═══════════════════════════════════════════════
     WORD DATABASE — 120 questions, 3 levels × 40
     素材來源：IELTS 閱讀538考點詞（reading538words.js）
  ═══════════════════════════════════════════════ */
  const DB = [

    /* ── BEGINNER ── */
    {
      level: "beginner",
      word: "important",
      sentence: `Climate change is an <span class="target-word">important</span> issue that requires immediate action from all governments.`,
      correct: ["crucial", "significant", "vital"],
      distractors: ["trivial", "minor"],
      explanation: "crucial、significant、vital 均可在學術語境中表達高度重要性，適合替換 important 用於論文寫作。"
    },
    {

  const TIERS = [
    { min: 10, label: "Expert",    desc: "完美！傑出的學術詞彙掌握力，具備 IELTS Band 9 寫作水準。" },
    { min: 8,  label: "Very Good", desc: "詞彙精準度極高，達到 Band 8 強勢寫手的水準。" },
    { min: 6,  label: "Good",      desc: "學術語域運用扎實，考官一定對你的詞彙留下深刻印象。" },
    { min: 4,  label: "Competent", desc: "整體表現良好，但正式詞彙的精準度仍有進步空間。" },
    { min: 2,  label: "Modest",    desc: "對學術詞彙有基本認識，繼續累積單字量。" },
    { min: 0,  label: "Limited",   desc: "學術同義詞需要更多練習。仔細看解析，再試一次！" }
  ];

  /* ═══════════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════════ */
  let queue        = [];
  let current      = null;
  let questionIdx  = 0;
  let correctCount = 0;
  let selected     = new Set();
  let confirmed    = false;
  let history      = [];   // { q, playerAnswers, isCorrect }
  let currentLevel = "";

  let timerInterval = null;
  let timeLeft      = 10;
  let autoNextTimer = null;
  let audioCtx      = null;

  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }

  // Unlock audio on first real user tap (required by iOS Safari)
  document.addEventListener('touchstart', () => {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }, { once: true });
  const CIRCUMFERENCE = 99.9;

  function getTimerTotal() {
    if (currentLevel === 'beginner')     return 20;
    if (currentLevel === 'intermediate') return 15;
    return 10; // advanced / review
  }

  /* ═══════════════════════════════════════════════
     DOM
  ═══════════════════════════════════════════════ */
  const gameHeader     = document.getElementById('game-header');
  const screenDiff     = document.getElementById('screen-difficulty');
  const screenGame     = document.getElementById('screen-game');
  const screenEnd      = document.getElementById('screen-end');

  const progressBar    = document.getElementById('progress-bar');
  const qCounter       = document.getElementById('q-counter');
  const scoreVal       = document.getElementById('score-val');
  const timerArc       = document.getElementById('timer-arc');
  const timerNum       = document.getElementById('timer-num');

  const sentenceBlock  = document.getElementById('sentence-block');
  const baseWordEl     = document.getElementById('base-word');
  const optionsGrid    = document.getElementById('options-grid');
  const feedback       = document.getElementById('feedback');
  const confirmBtn     = document.getElementById('confirm-btn');
  const nextBtn        = document.getElementById('next-btn');

  /* ═══════════════════════════════════════════════
     UTILS
  ═══════════════════════════════════════════════ */
  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function setScreen(name) {
    [screenDiff, screenGame, screenEnd].forEach(s => s.classList.remove('active'));
    if (name === 'difficulty') {
      screenDiff.classList.add('active');
      gameHeader.style.display = 'none';
      renderWrongCard();
    } else if (name === 'game') {
      screenGame.classList.add('active');
      gameHeader.style.display = '';
    } else {
      screenEnd.classList.add('active');
      gameHeader.style.display = 'none';
    }
  }

  function updateHeader() {
    const total = queue.length || 10;
    qCounter.textContent    = `第 ${questionIdx + 1} 題 / 共 ${total} 題`;
    scoreVal.textContent    = correctCount;
    progressBar.style.width = (questionIdx / total * 100) + '%';
  }

  /* ═══════════════════════════════════════════════
     TIMER
  ═══════════════════════════════════════════════ */
  function updateTimerUI(t) {
    const total  = getTimerTotal();
    const offset = CIRCUMFERENCE * (1 - t / total);
    timerArc.style.strokeDashoffset = offset;
    timerNum.textContent = t;
    timerArc.classList.remove('warn', 'alert');
    if (t <= 3)      timerArc.classList.add('alert');
    else if (t <= 5) timerArc.classList.add('warn');
  }

  function startTimer() {
    clearInterval(timerInterval);
    timeLeft = getTimerTotal();
    updateTimerUI(timeLeft);
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerUI(timeLeft);
      if (timeLeft <= 0) {
        clearInterval(timerInterval);
        autoConfirm();
      }
    }, 1000);
  }

  function stopTimer() {
    clearInterval(timerInterval);
  }

  function autoConfirm() {
    if (confirmed) return;
    confirmBtn.click();
  }

  /* ═══════════════════════════════════════════════
     SOUND (Web Audio API — Piano Arpeggios)
  ═══════════════════════════════════════════════ */
  function playSound(type) {
    try {
      const ctx = getAudioCtx();
      if (type === 'correct') {
        // C5 → E5 → G5 上行琶音
        [523, 659, 784].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const g   = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.09;
          g.gain.setValueAtTime(0.28, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
          osc.start(t); osc.stop(t + 0.35);
        });
      } else {
        // A4 → F4 下行兩音，柔和提示
        [440, 349].forEach((freq, i) => {
          const osc = ctx.createOscillator();
          const g   = ctx.createGain();
          osc.connect(g); g.connect(ctx.destination);
          osc.type = 'sine';
          osc.frequency.value = freq;
          const t = ctx.currentTime + i * 0.12;
          g.gain.setValueAtTime(0.22, t);
          g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
          osc.start(t); osc.stop(t + 0.3);
        });
      }
    } catch (_) {}
  }

  /* ═══════════════════════════════════════════════
     LOCALSTORAGE — WRONG HISTORY
  ═══════════════════════════════════════════════ */
  const HISTORY_KEY = 'ielts_wrong_history';

  function getWrongList() {
    try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
    catch (_) { return []; }
  }

  function saveWrongQuestion(q) {
    const list = getWrongList();
    if (!list.some(x => x.word === q.word && x.level === q.level)) {
      list.push({ word: q.word, level: q.level });
      localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
    }
  }

  function removeCorrectQuestion(q) {
    const list = getWrongList().filter(x => !(x.word === q.word && x.level === q.level));
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  }

  function clearHistory() {
    localStorage.removeItem(HISTORY_KEY);
    renderWrongCard();
  }

  function renderWrongCard() {
    const list = getWrongList();
    const wrap = document.getElementById('wrong-card-wrap');
    if (list.length === 0) { wrap.style.display = 'none'; return; }
    wrap.style.display = '';
    document.getElementById('wrong-card-count').textContent = `${list.length} 題待複習`;
  }

  /* ═══════════════════════════════════════════════
     DIFFICULTY SELECTION
  ═══════════════════════════════════════════════ */
  document.querySelectorAll('.diff-card').forEach(card => {
    card.addEventListener('click', () => startGame(card.dataset.level));
  });

  document.getElementById('wrong-card').addEventListener('click', () => startGame('review'));

  /* ═══════════════════════════════════════════════
     GAME START
  ═══════════════════════════════════════════════ */
  function startGame(level) {
    let pool;
    if (level === 'review') {
      const wrongs = getWrongList();
      pool = DB.filter(q => wrongs.some(w => w.word === q.word && w.level === q.level));
      if (pool.length === 0) { renderWrongCard(); return; }
    } else {
      pool = DB.filter(q => q.level === level);
    }
    queue        = shuffle(pool).slice(0, 10);
    correctCount = 0;
    questionIdx  = 0;
    history      = [];
    currentLevel = level;

    setScreen('game');
    loadQuestion();
  }

  /* ═══════════════════════════════════════════════
     LOAD QUESTION
  ═══════════════════════════════════════════════ */
  function scheduleNextQuestion() {
    let count = 3;
    nextBtn.textContent = `下一題（${count}）`;
    nextBtn.classList.add('visible');
    autoNextTimer = setInterval(() => {
      count--;
      nextBtn.textContent = count > 0 ? `下一題（${count}）` : '下一題';
      if (count <= 0) {
        clearInterval(autoNextTimer);
        questionIdx++;
        loadQuestion();
      }
    }, 1000);
  }

  function loadQuestion() {
    clearInterval(autoNextTimer);
    if (questionIdx >= queue.length) { showEndScreen(); return; }

    current   = queue[questionIdx];
    selected  = new Set();
    confirmed = false;

    updateHeader();

    // Sentence
    sentenceBlock.innerHTML = `"${current.sentence}"`;
    sentenceBlock.classList.remove('fade-up');
    void sentenceBlock.offsetWidth;
    sentenceBlock.classList.add('fade-up');

    // Base word
    baseWordEl.textContent = current.word;
    baseWordEl.parentElement.classList.remove('fade-up');
    void baseWordEl.parentElement.offsetWidth;
    baseWordEl.parentElement.classList.add('fade-up');

    // Options
    const allOptions = shuffle([...current.correct, ...current.distractors]);
    optionsGrid.innerHTML = '';
    allOptions.forEach(word => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.textContent = word;
      btn.addEventListener('click', () => toggleOption(btn, word));
      optionsGrid.appendChild(btn);
    });

    // Reset controls
    feedback.textContent = '';
    feedback.className   = '';
    confirmBtn.disabled  = true;
    confirmBtn.style.display = '';
    nextBtn.textContent = '下一題';
    nextBtn.classList.remove('visible');

    startTimer();
  }

  /* ═══════════════════════════════════════════════
     TOGGLE OPTION
  ═══════════════════════════════════════════════ */
  function toggleOption(btn, word) {
    if (confirmed) return;
    if (selected.has(word)) {
      selected.delete(word);
      btn.classList.remove('selected');
    } else {
      selected.add(word);
      btn.classList.add('selected');
    }
    confirmBtn.disabled = selected.size === 0;
  }

  /* ═══════════════════════════════════════════════
     CONFIRM
  ═══════════════════════════════════════════════ */
  confirmBtn.addEventListener('click', () => {
    if (confirmed) return;
    confirmed = true;
    stopTimer();
    confirmBtn.style.display = 'none';

    const correctSet = new Set(current.correct);
    const isCorrect  =
      selected.size === correctSet.size &&
      [...selected].every(w => correctSet.has(w));

    // Reveal buttons
    optionsGrid.querySelectorAll('.opt-btn').forEach(btn => {
      btn.disabled = true;
      const w = btn.textContent;
      const isCorrectWord = correctSet.has(w);
      const isSelected    = selected.has(w);
      if (isCorrectWord && isSelected)       btn.classList.add('reveal-correct');
      else if (!isCorrectWord && isSelected) btn.classList.add('reveal-wrong');
      else if (isCorrectWord && !isSelected) btn.classList.add('reveal-missed');
      btn.classList.remove('selected');
    });

    if (isCorrect) {
      correctCount++;
      scoreVal.textContent = correctCount;
      feedback.textContent = `+1 分 — 完全正確！`;
      feedback.className   = 'visible';
      playSound('correct');
      removeCorrectQuestion(current);
    } else {
      const reason = selected.size === 0 ? '時間到 — ' : '';
      feedback.textContent = `${reason}未完全正確 — 橘色為漏選，紅色為誤選`;
      feedback.className   = 'visible';
      screenGame.classList.add('shake');
      screenGame.addEventListener('animationend', () => screenGame.classList.remove('shake'), { once: true });
      playSound('wrong');
      saveWrongQuestion(current);
    }

    history.push({ q: current, playerAnswers: [...selected], isCorrect });

    progressBar.style.width = ((questionIdx + 1) / queue.length * 100) + '%';
    scheduleNextQuestion();
  });

  /* ═══════════════════════════════════════════════
     NEXT
  ═══════════════════════════════════════════════ */
  nextBtn.addEventListener('click', () => {
    clearInterval(autoNextTimer);
    questionIdx++;
    loadQuestion();
  });

  // Initial render of wrong card on page load
  renderWrongCard();

  /* ═══════════════════════════════════════════════
     END SCREEN
  ═══════════════════════════════════════════════ */
  function showEndScreen() {
    progressBar.style.width = '100%';
    setScreen('end');

    const tier = TIERS.find(t => correctCount >= t.min);
    document.getElementById('score-band').textContent = correctCount;
    document.getElementById('score-tier').textContent = tier.label;
    document.getElementById('score-desc').textContent = tier.desc;

    // Review cards
    const list = document.getElementById('review-list');
    list.innerHTML = '';

    history.forEach((entry, i) => {
      const { q, playerAnswers, isCorrect } = entry;
      const card = document.createElement('div');
      card.className = `review-card ${isCorrect ? 'correct' : 'wrong'}`;

      const playerSet  = new Set(playerAnswers);
      const correctSet = new Set(q.correct);

      const missedWords = q.correct.filter(w => !playerSet.has(w));
      const wrongWords  = playerAnswers.filter(w => !correctSet.has(w));

      card.innerHTML = `
        <div class="review-card-header">
          <span class="review-q-label">Q${i + 1}</span>
          <span class="review-result-badge">${isCorrect ? '✓ 答對' : '✗ 未完全正確'}</span>
        </div>
        <div class="review-sentence">"${q.sentence}"</div>
        <div class="review-answers">
          <div class="review-answer-row">
            <span class="review-answer-label">正確答案：</span>
            <span class="review-answer-words">${q.correct.join(' · ')}</span>
          </div>
          <div class="review-answer-row">
            <span class="review-answer-label">你的答案：</span>
            <span class="review-answer-words ${!isCorrect ? 'miss' : ''}">${playerAnswers.length ? playerAnswers.join(' · ') : '（未選）'}</span>
          </div>
          ${missedWords.length ? `<div class="review-answer-row"><span class="review-answer-label" style="color:var(--orange)">漏選：</span><span class="review-answer-words" style="color:var(--orange)">${missedWords.join(' · ')}</span></div>` : ''}
          ${wrongWords.length  ? `<div class="review-answer-row"><span class="review-answer-label" style="color:var(--red)">誤選：</span><span class="review-answer-words" style="color:var(--red)">${wrongWords.join(' · ')}</span></div>` : ''}
        </div>
        <div class="review-explanation">${q.explanation}</div>
      `;
      list.appendChild(card);
    });

    screenEnd.scrollTop = 0;
  }

  /* ═══════════════════════════════════════════════
     RESTART
  ═══════════════════════════════════════════════ */
  document.getElementById('restart-btn').addEventListener('click', () => {
    setScreen('difficulty');
  });

  // Register Service Worker for PWA offline support
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  </script>
</body>
</html>
